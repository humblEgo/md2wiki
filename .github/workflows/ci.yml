name: CI

# remote 연결 후 아래 두 줄의 주석을 해제하면 push/PR에서 자동 실행된다 (M8).
on:
  # push:
  #   branches: [main]
  # pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
